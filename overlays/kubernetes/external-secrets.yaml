# ExternalSecret - syncs database credentials to eso-demo namespace
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: eso-demo
spec:
  refreshInterval: 1h  # Check for updates every hour
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-secret-store
  target:
    name: database-credentials  # Name of the created secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: eso-demo
          synced-by: external-secrets
  data:
  - secretKey: DB_USERNAME
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: database-credentials
      metadataPolicy: None
      property: username
  - secretKey: DB_PASSWORD
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: database-credentials
      metadataPolicy: None
      property: password
  - secretKey: DB_HOST
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: database-credentials
      metadataPolicy: None
      property: host
  - secretKey: DB_PORT
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: database-credentials
      metadataPolicy: None
      property: port
---
# ExternalSecret - syncs API keys
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-keys
  namespace: eso-demo
spec:
  refreshInterval: 30m
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-secret-store
  target:
    name: api-keys
    creationPolicy: Owner
  dataFrom:
  - extract:
      conversionStrategy: Default
      decodingStrategy: None
      key: api-keys
      metadataPolicy: None
---
# ExternalSecret - syncs TLS certificates
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tls-certificates
  namespace: eso-demo
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-secret-store
  target:
    name: app-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
  - secretKey: tls.crt
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: tls-certificates
      metadataPolicy: None
      property: tls.crt
  - secretKey: tls.key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: tls-certificates
      metadataPolicy: None
      property: tls.key
