apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: eso-demo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-secret-store
  target:
    name: database-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/part-of: eso-demo
          synced-by: external-secrets
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: eso-demo/database-credentials
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: eso-demo/database-credentials
        property: password
    - secretKey: DB_HOST
      remoteRef:
        key: eso-demo/database-credentials
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: eso-demo/database-credentials
        property: port
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-keys
  namespace: eso-demo
spec:
  refreshInterval: 30m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-secret-store
  target:
    name: api-keys
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: eso-demo/api-keys
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tls-certificates
  namespace: eso-demo
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-secret-store
  target:
    name: app-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: eso-demo/tls-certificates
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: eso-demo/tls-certificates
        property: tls.key
