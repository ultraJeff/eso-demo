# Service Account for ESO to read from secret-store namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secret-reader
  namespace: secret-store
---
# Role to read secrets in secret-store namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: secret-store
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
# Bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-secret-reader-binding
  namespace: secret-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-reader
subjects:
- kind: ServiceAccount
  name: eso-secret-reader
  namespace: secret-store

