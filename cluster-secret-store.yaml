# ClusterSecretStore - uses Kubernetes secrets as a source (simulates Vault/AWS)
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: kubernetes-secret-store
spec:
  provider:
    kubernetes:
      # Use a remote Kubernetes cluster (in this case, the same cluster)
      remoteNamespace: secret-store
      server:
        # Use in-cluster authentication
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          namespace: kube-system
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-secret-reader
          namespace: secret-store

