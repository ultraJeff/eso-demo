# Namespace that holds the "source" secrets (simulating a vault)
apiVersion: v1
kind: Namespace
metadata:
  name: secret-store
  labels:
    app.kubernetes.io/part-of: eso-demo
    demo: external-secrets
---
# Source secrets stored here (simulates external secret manager like Vault/AWS Secrets Manager)
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: secret-store
type: Opaque
stringData:
  username: db-admin
  password: supersecret123
  host: postgres.database.svc.cluster.local
  port: "5432"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: secret-store
type: Opaque
stringData:
  stripe-api-key: sk_live_abc123xyz
  sendgrid-api-key: SG.abcdefghijklmnop
  openai-api-key: sk-proj-demo12345
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-certificates
  namespace: secret-store
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIIDazCCAlOgAwIBAgIUdemo12345==
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    MIIEvgIBADANdemo67890==
    -----END PRIVATE KEY-----

